  source_layout: docs/remicsdev/source-layout.md
  infrastructure_mapping: docs/remicsdev/infrastructure-mapping.md
  web_app_structure: docs/remicsdev/web-app-structure.md
  login_flow: docs/remicsdev/login-flow.md
  batch_programs: docs/remicsdev/batch-programs.md
  tsip: docs/remicsdev/tsip.md
  tsip_tt_tables: docs/remicsdev/tsip-tt-tables.md
  tsip_archive_plan: docs/remicsdev/tsip-archive-plan.md
  github_setup: docs/github-setup-checklist.md
  database_access: docs/remicsdev/database-access.md
  automated_testing: docs/remicsdev/automated-testing.md
  verify_batch_script: scripts/verify-batch-mapping.ps1
  compare_batch_bins_script: scripts/compare-batch-bins.ps1
  invoke_remicsdev_sql_script: scripts/Invoke-RemicsDevSql.ps1
  extract_session_keys_script: scripts/extract-session-keys.ps1
  todo: docs/TODO.md

validation:
  login_browser_test: passed
  login_browser_test_date: 2026-06-17
  login_test_method: Tlogin.aspx → shownetsession.aspx
